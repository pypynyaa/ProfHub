<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Консультация - ProfHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .chat-container {
            height: calc(100vh - 300px);
            display: flex;
            flex-direction: column;
        }
        .messages-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .message {
            max-width: 75%;
            margin-bottom: 1rem;
        }
        .message.outgoing {
            margin-left: auto;
        }
        .message-content {
            padding: 0.75rem;
            border-radius: 1rem;
        }
        .outgoing .message-content {
            background-color: #0d6efd;
            color: white;
        }
        .incoming .message-content {
            background-color: #f8f9fa;
        }
        .message-time {
            font-size: 0.75rem;
            color: #6c757d;
        }
        .outgoing .message-time {
            text-align: right;
        }
    </style>
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <main class="container my-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="mb-0">Консультация</h1>
                        <p class="text-muted mb-0">
                            <span th:if="${chat.consultant != null}" 
                                  th:text="'Консультант: ' + ${chat.consultant.firstName + ' ' + chat.consultant.lastName}">
                                Консультант
                            </span>
                            <span th:if="${chat.consultant == null}">
                                Ожидание консультанта
                            </span>
                        </p>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/chat/list}" class="btn btn-outline-primary">
                            <i class="bi bi-arrow-left me-2"></i>К списку консультаций
                        </a>
                    </div>
                </div>

                <div class="card chat-container">
                    <div class="messages-container">
                        <div th:if="${chat.messages.empty}" class="text-center text-muted py-5">
                            <i class="bi bi-chat-square-text fs-1"></i>
                            <p class="mt-3" th:if="${chat.consultant == null}">
                                Ожидайте подключения консультанта...
                            </p>
                            <p class="mt-3" th:if="${chat.consultant != null}">
                                Начните диалог с консультантом
                            </p>
                        </div>
                        
                        <div th:each="message : ${chat.messages}" 
                             th:class="${message.user.id == #authentication.principal.id} ? 'message outgoing' : 'message incoming'">
                            <div class="message-content">
                                <p class="mb-0" th:text="${message.content}">Текст сообщения</p>
                            </div>
                            <div class="message-time">
                                <small th:text="${#temporals.format(message.createdAt, 'HH:mm')}">12:34</small>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer" th:if="${chat.status.name() != 'CLOSED'}">
                        <form th:action="@{/chat/{id}/message(id=${chat.id})}" 
                              method="post" 
                              th:object="${newMessage}">
                            <div class="input-group">
                                <input type="text" 
                                       class="form-control" 
                                       th:field="*{content}" 
                                       placeholder="Введите сообщение..."
                                       required>
                                <button class="btn btn-primary" type="submit">
                                    <i class="bi bi-send me-2"></i>Отправить
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center text-muted" th:if="${chat.status.name() == 'CLOSED'}">
                        Консультация завершена
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        // Прокрутка к последнему сообщению при загрузке страницы
        window.onload = function() {
            var messagesContainer = document.querySelector('.messages-container');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
