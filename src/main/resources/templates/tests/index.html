<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Психологические тесты</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Доступные тесты</h1>
        <div class="tests-grid">
            <div class="test-card">
                <h3>Тест на внимательность</h3>
                <p>Проверьте свою способность концентрироваться и замечать детали.</p>
                <a href="/tests/attention" class="btn">Начать тест</a>
            </div>
            <div class="test-card">
                <h3>Тест на память</h3>
                <p>Оцените свою кратковременную и долговременную память.</p>
                <a href="/tests/memory" class="btn">Начать тест</a>
            </div>
            <div class="test-card">
                <h3>Тест на реакцию</h3>
                <p>Измерьте скорость своей реакции на различные стимулы.</p>
                <a href="/tests/reaction" class="btn">Начать тест</a>
            </div>
        </div>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
